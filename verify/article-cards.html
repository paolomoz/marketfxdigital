<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>verify: article-cards</title>
<link rel="stylesheet" href="/styles/styles.css">
<link rel="stylesheet" href="/blocks/article-cards/article-cards.css">
<style>body{display:block!important}.vlabel{color:#8aa;font:700 12px/1 Inter;letter-spacing:.1em;text-transform:uppercase;padding:24px 24px 0}</style>
</head>
<body class="appear">
<main>
  <p class="vlabel">1 · limit = 3 (home "From the Blog")</p>
  <div class="section"><div class="article-cards-wrapper"><div class="article-cards block" data-block-name="article-cards"><div><div>3</div></div></div></div></div>

  <p class="vlabel">2 · no limit (blog index, all /blog/ entries, sorted date desc)</p>
  <div class="section"><div class="article-cards-wrapper"><div class="article-cards block" id="all" data-block-name="article-cards"></div></div></div>

  <p class="vlabel">3 · fetch fails (graceful — renders nothing below this label)</p>
  <div class="section"><div class="article-cards-wrapper"><div class="article-cards block" id="fail" data-block-name="article-cards"></div></div></div>
  <p class="vlabel">— end —</p>
</main>
<script type="module">
  import decorate from '/blocks/article-cards/article-cards.js';
  const blocks = [...document.querySelectorAll('.article-cards.block')];
  (async () => {
    // 1 & 2 use the real fixture
    await decorate(blocks[0]);
    await decorate(blocks[1]);
    // 3: force fetch to fail to prove graceful behaviour
    const orig = window.fetch;
    window.fetch = () => Promise.reject(new Error('simulated network failure'));
    await decorate(blocks[2]);
    window.fetch = orig;
    window.__ready = true;
  })();
</script>
</body>
</html>
